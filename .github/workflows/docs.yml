name: Docs

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build docs
        run: cargo doc --no-deps
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: target/doc
          retention-days: 7
